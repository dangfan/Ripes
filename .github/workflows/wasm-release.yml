name: WASM / Qt 6.6.0
on:
  push:
    branches:
      - '**'
  workflow_dispatch:

jobs:
  buildUbuntu:
    runs-on: ubuntu-latest
    env:
      CC: emcc
      CXX: em++

    strategy:
      matrix:
        build-type: [MinSizeRel]

    permissions:
      contents: read
      id-token: write
      deployments: write

    steps:

    - name: Job info
      run: |
        echo "GitHub Ref: ${{ github.ref }}"
        echo "Event: ${{ github.event }}"

    - name: get container ready for build
      run: |
        sudo apt-get update
        DEBIAN_FRONTEND=noninteractive sudo apt-get install -y -q --force-yes \
        automake cmake git wget libfuse2 desktop-file-utils tree \
        build-essential libgl1-mesa-dev libxkbcommon-x11-0 libpulse-dev \
        libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-render-util0 \
        libxcb-xinerama0 libxcb-composite0 libxcb-cursor0 libxcb-damage0 \
        libxcb-dpms0 libxcb-dri2-0 libxcb-dri3-0 libxcb-ewmh2 libxcb-glx0 \
        libxcb-present0 libxcb-randr0 libxcb-record0 libxcb-render0 libxcb-res0 \
        libxcb-screensaver0 libxcb-shape0 libxcb-shm0 libxcb-sync1 libxcb-util1 libegl1 libegl1-mesa-dev

    - name: checkout sources
      uses: actions/checkout@v6
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Install Qt (Host)
      uses: jurplel/install-qt-action@v4
      with:
        aqtversion: '==3.1.*'
        py7zrversion: '>=0.20.2'
        version: '6.6.0'
        host: 'linux'
        target: 'desktop'
        arch: 'gcc_64'
        cache: 'true'
        cache-key-prefix: 'install-qt-host-6.6.0'
        modules: 'qtcharts'

    - name: Install Qt (Emscripten)
      uses: jurplel/install-qt-action@v4
      with:
        aqtversion: '==3.1.*'
        py7zrversion: '>=0.20.2'
        version: '6.6.0'
        host: 'linux'
        target: 'desktop'
        arch: 'wasm_multithread'
        modules: 'qtcharts'
        cache: 'true'
        cache-key-prefix: 'install-qt-emscripten-6.6.0'

    - name: cache Emscripten
      uses: actions/cache@v5
      with:
        path: ./emsdk
        key: ${{ runner.os }}-wasm-emsdk

    - name: install Emscripten
      run: |
        if [ ! -d emsdk ]; then
          git clone https://github.com/emscripten-core/emsdk.git
        fi
        cd emsdk
        ./emsdk install 3.1.25
        ./emsdk activate 3.1.25

    - name: cache build result
      uses: actions/cache@v5
      with:
        path: ./build
        key: ${{ runner.os }}-wasm-builddir

    - name: build Ripes
      run: |
        echo "building desktop"
        source emsdk/emsdk_env.sh
        export QT_HOST_PATH=$(pwd)/../Qt/6.6.0/gcc_64/
        find ${QT_HOST_PATH}
        cmake                                           \
          -S . -B build                                 \
          -DCMAKE_BUILD_TYPE=${{ matrix.build-type }}   \
          -DRIPES_WITH_QPROCESS=OFF                     \
          -DEMSCRIPTEN=1                                \
          -DQT_HOST_PATH="${QT_HOST_PATH}"              \
          -DCMAKE_TOOLCHAIN_FILE=$(pwd)/../Qt/6.6.0/wasm_multithread/lib/cmake/Qt6/qt.toolchain.cmake \
          -DCMAKE_PREFIX_PATH=$(pwd)/../Qt/6.6.0/wasm_multithread/ \
          -DEMSCRIPTEN_FORCE_COMPILERS=ON \
          .
        cmake --build build -j $(nproc)

    - uses: actions/upload-artifact@v7
      with:
        name: ${{ matrix.build-type }}_wasm
        path: |
          build/Ripes.wasm
          build/Ripes.js
          build/Ripes.worker.js
          build/qtloader.js

    - name: Prepare R2 wasm metadata
      if: ${{ github.ref == 'refs/heads/cf-pages-deploy' }}
      id: wasm_meta
      shell: bash
      env:
        R2_PUBLIC_BASE_URL: ${{ vars.CLOUDFLARE_R2_PUBLIC_BASE_URL }}
      run: |
        set -euo pipefail
        if [ -z "${R2_PUBLIC_BASE_URL:-}" ]; then
          echo "Missing GitHub variable CLOUDFLARE_R2_PUBLIC_BASE_URL (eg. https://assets.example.com)"
          exit 1
        fi
        WASM_KEY="ripes/${GITHUB_SHA}/Ripes.wasm"
        WASM_URL="${R2_PUBLIC_BASE_URL%/}/${WASM_KEY}"
        echo "wasm_key=${WASM_KEY}" >> "$GITHUB_OUTPUT"
        echo "wasm_url=${WASM_URL}" >> "$GITHUB_OUTPUT"

    - name: Validate Cloudflare deploy inputs
      if: ${{ github.ref == 'refs/heads/cf-pages-deploy' }}
      shell: bash
      env:
        CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        CLOUDFLARE_R2_BUCKET: ${{ secrets.CLOUDFLARE_R2_BUCKET }}
        R2_PUBLIC_BASE_URL: ${{ vars.CLOUDFLARE_R2_PUBLIC_BASE_URL }}
      run: |
        set -euo pipefail
        [ -n "${CLOUDFLARE_ACCOUNT_ID:-}" ] || { echo "Missing secret: CLOUDFLARE_ACCOUNT_ID"; exit 1; }
        [ -n "${CLOUDFLARE_API_TOKEN:-}" ] || { echo "Missing secret: CLOUDFLARE_API_TOKEN"; exit 1; }
        [ -n "${CLOUDFLARE_R2_BUCKET:-}" ] || { echo "Missing secret: CLOUDFLARE_R2_BUCKET"; exit 1; }
        [ -n "${R2_PUBLIC_BASE_URL:-}" ] || { echo "Missing variable: CLOUDFLARE_R2_PUBLIC_BASE_URL"; exit 1; }
        case "${R2_PUBLIC_BASE_URL}" in
          http://*|https://*) ;;
          *) echo "CLOUDFLARE_R2_PUBLIC_BASE_URL must start with http:// or https://"; exit 1 ;;
        esac

    - name: Preflight Cloudflare R2 access
      uses: cloudflare/wrangler-action@v3
      if: ${{ github.ref == 'refs/heads/cf-pages-deploy' }}
      with:
        apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        wranglerVersion: "4.74.0"
        command: r2 bucket list
        gitHubToken: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload wasm to Cloudflare R2
      uses: cloudflare/wrangler-action@v3
      if: ${{ github.ref == 'refs/heads/cf-pages-deploy' }}
      with:
        apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        wranglerVersion: "4.74.0"
        command: r2 object put ${{ secrets.CLOUDFLARE_R2_BUCKET }}/${{ steps.wasm_meta.outputs.wasm_key }} --remote --file build/Ripes.wasm --content-type application/wasm --cache-control "public, max-age=31536000, immutable"
        gitHubToken: ${{ secrets.GITHUB_TOKEN }}

    - name: Verify wasm object on remote R2
      uses: cloudflare/wrangler-action@v3
      if: ${{ github.ref == 'refs/heads/cf-pages-deploy' }}
      with:
        apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        wranglerVersion: "4.74.0"
        command: r2 object get ${{ secrets.CLOUDFLARE_R2_BUCKET }}/${{ steps.wasm_meta.outputs.wasm_key }} --remote --file /tmp/ripes-wasm-verify.wasm
        gitHubToken: ${{ secrets.GITHUB_TOKEN }}

    - name: Rewrite wasm URL in generated JS
      if: ${{ github.ref == 'refs/heads/cf-pages-deploy' }}
      shell: bash
      env:
        WASM_URL: ${{ steps.wasm_meta.outputs.wasm_url }}
      run: |
        set -euo pipefail
        grep -q 'Ripes\.wasm' build/Ripes.js
        sed -i "s|Ripes\\.wasm|${WASM_URL}|g" build/Ripes.js
        grep -q "${WASM_URL}" build/Ripes.js

    - name: Create site directory  
      run: |
        mkdir -p publish
        cp build/*.js publish/
        cp -r resources/wasm/* publish/
        ls -alh publish/

    - name: Deploy to Cloudflare Pages
      uses: cloudflare/wrangler-action@v3
      if: ${{ github.ref == 'refs/heads/cf-pages-deploy' }}
      with:
        apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        wranglerVersion: "4.74.0"
        command: pages deploy ./publish/ --project-name=ripes 
        gitHubToken: ${{ secrets.GITHUB_TOKEN }}

    # Dispatch the publish.yml workflow over at mortbopet.github.io
    - name: Publish to GitHub Pages
      run: |
        gh workflow run publish.yml -R mortbopet/mortbopet.github.io --ref master
      if: github.repository == 'mortbopet/Ripes' && github.event_name != 'pull_request' && github.ref == 'refs/heads/master'
      env:
        GH_TOKEN: ${{ secrets.MORTBOPET_GITHUB_IO_TOKEN }}
